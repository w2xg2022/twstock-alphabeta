name: 更新台股 alpha/beta 資料

on:
  schedule:
    # 台灣時間週二至週六 11:30 = UTC 週一至週五 03:30
    - cron: "30 3 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 抓取上市/上櫃公司清單
        run: python scripts/fetch_list.py

      - name: 計算 alpha/beta
        run: python scripts/compute.py

      - name: 提交並推送變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_list.csv docs/data/alphabeta.json
          git diff --cached --quiet || git commit -m "chore: 自動更新 alpha/beta 資料 $(date -u +%Y-%m-%d)"
          git push
