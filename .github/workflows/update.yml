name: 更新台股 alpha/beta 資料

on:
  schedule:
    # 台灣時間週一至週五 16:00 = UTC 週一至週五 08:00
    # (交易日13:30收盤後，下午資料就已可靠可用；提早一點跑也是給GitHub Actions排程本身
    #  常見的延遲/不準時留緩衝)
    - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 抓取上市/上櫃公司清單
        run: python scripts/fetch_list.py

      - name: 計算 alpha/beta
        run: python scripts/compute.py

      - name: 取得資料對應的交易日
        id: data_date
        run: |
          DATA_DATE=$(python3 -c "import json;print(json.load(open('docs/data/alphabeta.json'))['data_date'])")
          echo "date=$DATA_DATE" >> "$GITHUB_OUTPUT"
          echo "compact=${DATA_DATE//-/}" >> "$GITHUB_OUTPUT"

      - name: 提交並推送變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_list.csv docs/data/alphabeta.json docs/data/alphabeta.csv docs/data/trajectory.json
          git diff --cached --quiet || git commit -m "chore: 自動更新 alpha/beta 資料 ${{ steps.data_date.outputs.date }}"
          for i in 1 2 3 4 5; do
            git push && break
            echo "push被拒絕，pull --rebase後重試 ($i/5)"
            git pull --rebase origin main
            sleep $((i * 5))
          done

      - name: 發布當日 Release（alpha/beta CSV）
        env:
          GH_TOKEN: ${{ github.token }}
          DATE: ${{ steps.data_date.outputs.date }}
          COMPACT: ${{ steps.data_date.outputs.compact }}
        run: |
          TAG="data-$DATE"
          DATED_CSV="docs/data/alphabeta_$COMPACT.csv"
          cp docs/data/alphabeta.csv "$DATED_CSV"
          NOTES="全部個股60/120/240日 alpha、beta（含CAPM期望報酬率）。交易日：$DATE"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "台股 alpha/beta 資料 $DATE" --notes "$NOTES"
            gh release upload "$TAG" "$DATED_CSV" --clobber
          else
            gh release create "$TAG" \
              --title "台股 alpha/beta 資料 $DATE" \
              --notes "$NOTES" \
              "$DATED_CSV"
          fi
